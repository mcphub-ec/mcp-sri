version: '3.8'

services:
  xml-signature-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xml-signature-service
    ports:
      - "18081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - facturador-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/signature/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  facturador-network:
    driver: bridge